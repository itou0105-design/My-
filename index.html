<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>週間タスク管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ef;
    --surface: #fdfcfa;
    --ink: #1a1814;
    --ink-muted: #7a756e;
    --accent: #c8773a;
    --accent-soft: #f0e6d8;
    --check: #3a8c5c;
    --check-soft: #d8edd3;
    --border: #e2ddd6;
    --day-header-h: 48px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 32px 20px 60px;
  }

  header {
    max-width: 1200px;
    margin: 0 auto 36px;
    display: flex;
    align-items: baseline;
    gap: 20px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .week-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--ink-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .progress-bar-wrap {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .progress-text {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    min-width: 40px;
    text-align: right;
  }

  .progress-track {
    width: 120px;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* Grid */
  .grid {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
  }

  .day-col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .day-header {
    height: var(--day-header-h);
    padding: 0 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .day-name {
    font-size: 12px;
    font-weight: 700;
  }

  .day-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--ink-muted);
  }

  .day-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    background: var(--accent-soft);
    color: var(--accent);
    padding: 2px 6px;
    border-radius: 20px;
    min-width: 28px;
    text-align: center;
  }

  /* Today highlight */
  .day-col.today {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .day-col.today .day-header {
    background: var(--accent-soft);
  }

  /* Tasks */
  .tasks-list {
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }

  .task-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 8px;
    border-radius: 6px;
    transition: background 0.15s;
  }

  .task-item:hover { background: var(--bg); }
  .task-item.done { background: var(--check-soft); }

  .task-check {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    background: #fff;
    position: relative;
  }

  .task-check:checked {
    background: var(--check);
    border-color: var(--check);
  }

  .task-check:checked::after {
    content: '';
    position: absolute;
    left: 4px; top: 1px;
    width: 4px; height: 8px;
    border: 2px solid #fff;
    border-top: none; border-left: none;
    transform: rotate(42deg);
  }

  .task-text {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 12px;
    outline: none;
    min-width: 0;
  }

  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--check);
  }

  .footer {
    max-width: 1200px;
    margin: 24px auto 0;
    text-align: center;
    font-size: 11px;
    color: var(--ink-muted);
  }

  /* Responsive */
  @media (max-width: 1000px) {
    .grid { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 700px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 400px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>週間タスク</h1>
  <span class="week-label" id="weekLabel"></span>
  <div class="progress-bar-wrap">
    <span class="progress-text" id="progressText">0%</span>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</header>

<div class="grid" id="taskGrid"></div>
<p class="footer">入力内容は自動保存されます · クリックして編集</p>

<script>
const DAYS = ['月曜日','火曜日','水曜日','木曜日','金曜日','土曜日','日曜日'];
const TASKS_PER_DAY = 7;
const STORAGE_KEY = 'weekly_tasks_v1';

function getWeekDates() {
  const today = new Date();
  const day = today.getDay(); // 0:Sun, 1:Mon...
  const diffToMon = (day === 0) ? -6 : 1 - day;
  const monday = new Date(today);
  monday.setDate(today.getDate() + diffToMon);
  
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function formatDate(d) {
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function isToday(d) {
  const t = new Date();
  return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
}

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

const dates = getWeekDates();
const grid = document.getElementById('taskGrid');
let data = loadData();

document.getElementById('weekLabel').textContent = `${formatDate(dates[0])} – ${formatDate(dates[6])}`;

function updateProgress() {
  let total = 0, done = 0;
  for (let d = 0; d < 7; d++) {
    for (let t = 0; t < TASKS_PER_DAY; t++) {
      const key = `${d}_${t}`;
      if (data[key]?.text) { total++; if (data[key]?.done) done++; }
    }
  }
  const pct = total === 0 ? 0 : Math.round(done / total * 100);
  document.getElementById('progressText').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function updateDayCount(dayIdx) {
  let done = 0, total = 0;
  for (let t = 0; t < TASKS_PER_DAY; t++) {
    const key = `${dayIdx}_${t}`;
    if (data[key]?.text) { total++; if (data[key]?.done) done++; }
  }
  const el = document.getElementById(`count_${dayIdx}`);
  if (el) el.textContent = total === 0 ? '—' : `${done}/${total}`;
}

DAYS.forEach((dayName, di) => {
  const col = document.createElement('div');
  col.className = 'day-col' + (isToday(dates[di]) ? ' today' : '');
  col.style.animationDelay = `${di * 0.05}s`;

  const hdr = document.createElement('div');
  hdr.className = 'day-header';
  hdr.innerHTML = `
    <div>
      <div class="day-name">${dayName}</div>
      <div class="day-date">${formatDate(dates[di])}</div>
    </div>
    <span class="day-count" id="count_${di}">—</span>
  `;
  col.appendChild(hdr);

  const list = document.createElement('div');
  list.className = 'tasks-list';

  for (let t = 0; t < TASKS_PER_DAY; t++) {
    const key = `${di}_${t}`;
    if (!data[key]) data[key] = { text: '', done: false };

    const item = document.createElement('div');
    item.className = 'task-item' + (data[key].done ? ' done' : '');
    
    const chk = document.createElement('input');
    chk.type = 'checkbox';
    chk.className = 'task-check';
    chk.checked = data[key].done;

    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'task-text';
    inp.placeholder = `タスク ${t + 1}`;
    inp.value = data[key].text;

    chk.addEventListener('change', () => {
      data[key].done = chk.checked;
      item.classList.toggle('done', chk.checked);
      saveData(data);
      updateProgress();
      updateDayCount(di);
    });

    inp.addEventListener('input', () => {
      data[key].text = inp.value;
      saveData(data);
      updateProgress();
      updateDayCount(di);
    });

    item.appendChild(chk);
    item.appendChild(inp);
    list.appendChild(item);
  }

  col.appendChild(list);
  grid.appendChild(col);
  updateDayCount(di);
});

updateProgress();
</script>
</body>
</html>
