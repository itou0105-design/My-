<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>週間タスク管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ef;
    --surface: #fdfcfa;
    --ink: #1a1814;
    --ink-muted: #7a756e;
    --accent: #c8773a; /* オレンジ系 */
    --accent-soft: #fdf2e9;
    --check: #3a8c5c;
    --check-soft: #d8edd3;
    --border: #e2ddd6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--ink);
    padding: 20px 12px 60px;
  }

  header {
    max-width: 1200px;
    margin: 0 auto 20px;
  }

  header h1 { font-size: 24px; margin-bottom: 8px; }

  .progress-bar-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    padding: 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  .progress-track {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
    margin-top: 20px;
  }

  @media (min-width: 768px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 1024px) { .grid { grid-template-columns: repeat(7, 1fr); gap: 8px; } }

  .day-col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: all 0.3s ease;
  }

  /* ★【重要】今日の枠のスタイル ★ */
  .day-col.today {
    border: 3px solid var(--accent) !important; /* 枠を太く */
    background: var(--accent-soft) !important; /* 背景を薄オレンジに */
    box-shadow: 0 8px 20px rgba(200, 119, 58, 0.2);
    transform: translateY(-4px); /* 少し上に浮かせる */
  }

  .day-header {
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.02);
  }

  /* 今日のヘッダーだけ色を変える */
  .day-col.today .day-header {
    background: var(--accent);
    color: #fff;
  }

  .day-name { font-weight: 700; font-size: 15px; }
  .day-date { font-size: 12px; opacity: 0.8; }

  .tasks-list { padding: 12px; display: flex; flex-direction: column; gap: 8px; }

  .task-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    background: #fff;
    border-radius: 10px;
    border: 1px solid #eee;
  }

  .task-item.done { background: var(--check-soft); border-color: transparent; }

  .task-check {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-radius: 6px;
    appearance: none;
    background: #fff;
    position: relative;
    flex-shrink: 0;
  }

  .task-check:checked { background: var(--check); border-color: var(--check); }
  .task-check:checked::after {
    content: ''; position: absolute; left: 6px; top: 2px;
    width: 4px; height: 8px; border: 2px solid #fff;
    border-top: none; border-left: none; transform: rotate(45deg);
  }

  .task-text {
    flex: 1; border: none; background: transparent;
    font-size: 16px; outline: none; color: var(--ink);
  }

  .task-item.done .task-text { text-decoration: line-through; opacity: 0.5; }

  .footer { margin-top: 40px; text-align: center; font-size: 12px; color: var(--ink-muted); }
</style>
</head>
<body>

<header>
  <h1>週間タスク</h1>
  <div class="progress-bar-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%;"></div></div>
    <span id="progressText" style="font-family:'DM Mono'; font-weight:bold; color:var(--accent);">0%</span>
  </div>
</header>

<div class="grid" id="taskGrid"></div>
<p class="footer">自動保存されます。今日も良い一日を！</p>

<script>
const DAYS = ['月曜日','火曜日','水曜日','木曜日','金曜日','土曜日','日曜日'];
const TASKS_PER_DAY = 7;
const STORAGE_KEY = 'weekly_tasks_v1';

function getWeekDates() {
  const today = new Date();
  const day = today.getDay();
  const diffToMon = (day === 0) ? -6 : 1 - day;
  const monday = new Date(today);
  monday.setDate(today.getDate() + diffToMon);
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function formatDate(d) { return `${d.getMonth() + 1}/${d.getDate()}`; }
function isToday(d) {
  const t = new Date();
  return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
}

let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
const dates = getWeekDates();
const grid = document.getElementById('taskGrid');

function updateProgress() {
  let total = 0, done = 0;
  Object.keys(data).forEach(key => {
    if (data[key].text) { total++; if (data[key].done) done++; }
  });
  const pct = total === 0 ? 0 : Math.round(done / total * 100);
  document.getElementById('progressText').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

DAYS.forEach((dayName, di) => {
  const col = document.createElement('div');
  // ここで isToday を判定してクラスを付与
  const isTargetToday = isToday(dates[di]);
  col.className = 'day-col' + (isTargetToday ? ' today' : '');

  hdr.className = 'day-header';
  hdr.innerHTML = `<div><div class="day-name">${dayName}</div><div class="day-date">${formatDate(dates[di])}</div></div>`;
